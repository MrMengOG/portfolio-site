<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact me</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header class="header">
        <nav>
            <button id="header__menu-btn" aria-label="Toggle menu" aria-expanded="false">
                <span class="header__hamburger-icon"></span>
                <span class="header__hamburger-icon"></span>
                <span class="header__hamburger-icon"></span>
            </button>
            <ul class="header__nav-links" id="header__menu">
                <li><a class="header__nav-link" href="../index.html#header">Home</a></li>
                <li><a class="header__nav-link" href="../index.html#about">About</a></li>
                <li><a class="header__nav-link" href="../index.html#projects">Projects</a></li>
                <li><a class="header__nav-link" href="#header">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main class="contact">
        <div class="contact-form-area">
            <header class="contact-form__header">Contact form</header>
            <form class="contact-form" id="form">
                <div class="contact-form__input-field" id="name_field">
                    <label class="contact-form__label" for="name-input">Name</label>
                    <input class="contact-form__input" type="text"  id="name-input">
                    <div class="contact-form-error"></div>
                </div>
                <div class="contact-form__input-field" id="last_name_field">
                    <label class="contact-form__label" for="last-name-input">Last name</label>
                    <input class="contact-form__input" type="text"  id="last-name-input">
                    <div class="contact-form-error"></div>
                </div>
                <div class="contact-form__input-field" id="email_field">
                    <label class="contact-form__label" for="email-input">Email</label>
                    <input class="contact-form__input" type="text"  id="email">
                    <div class="contact-form-error"></div>
                </div>
                <div class="contact-form__input-field" id="message_field">
                    <label class="contact-form__label" for="message-input">Your message</label>
                    <textarea id="message-input" class="contact-form__input"></textarea>
                    <div class="contact-form-error"></div>
                </div>
                <div class="contact-form__action">
                    <button type="submit" class="contact-form_submit-btn btn">Submit</button>
                </div>
            </form>
        </div>
    </main>
    <footer class="footer">
        <span class="footer__header">Lets connect</span>
        <ul class="footer__social-links">
            <li><a class="footer__social-link" href="https://www.linkedin.com/in/mantas-karoblius/" target="_blank" rel="noopener norefferer"><img class="footer__social-icon" src="../assets/icons/linkedin-icon.webp" alt="linkedIn-icon">  LinkedIn</a></li>
            <li><a class="footer__social-link" href="https://github.com/MrMengOG" target="_blank" rel="noopener norefferer"><img class="footer__social-icon" src="../assets/icons/github-white-icon.webp" alt="gitHub-icon">  GitHub</a></li>
        </ul>
        <span class="footer__coppy">©2026 all rights reserved by Mantas Studio</span>
    </footer>
    <script type="module" src="../js/contact.js"></script>
</body>
</html>
