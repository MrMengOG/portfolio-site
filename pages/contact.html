<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact me</title>
</head>
<body>
    <header class="header">
        <nav>
            <ul class="header__nav-links">
                <li><a class="header__nav-link" href="../index.html#hero">Home</a></li>
                <li><a class="header__nav-link" href="../index.html#about">About</a></li>
                <li><a class="header__nav-link" href="../index.html#projects">Projects</a></li>
                <li><a class="header__nav-link" href="#header">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="contact-form-area">
            <header class="contact-form__header">Contact form</header>
            <form class="contact-form">
                <div class="contact-form__input-field">
                    <label class="contact-form__label" for="name-input">Name</label>
                    <input class="contact-form__input" type="text"  id="name-input" required>
                </div>
                <div class="contact-form__input-field">
                    <label class="contact-form__label" for="last-name-input">Last name</label>
                    <input class="contact-form__input" type="text"  id="last-name-input" required>
                </div>
                <div class="contact-form__input-field">
                    <label class="contact-form__label" for="email-input">Email</label>
                    <input class="contact-form__input" type="email"  id="email" required>
                </div>
                <div class="contact-form__input-field">
                    <label class="contact-form__label" for="message-input">Your massage</label>
                    <input class="contact-form__input" type="text"  id="message-input" required>
                </div>

                <div class="contact-form__action">
                    <button class="contact-form_submit-btn btn">Submit</button>
                </div>
            </form>
        </div>
    </main>
    <footer class="footer">
        <span class="footer__header">Lets connect</span>
        <ul class="footer__social-links">
            <li><a class="footer__social-link" href="https://www.linkedin.com/in/mantas-karoblius/" target="_blank" rel="noopener norefferer"><img src="/assets/icons/LinkedIn_icon.webp" alt="linkedIn-icon"></a></li>
            <li><a class="footer__social-link" href="https://github.com/MrMengOG" target="_blank" rel="noopener norefferer"><img src="/assets/icons/github-white-icon.webp" alt="gitHub-icon"></a></li>
        </ul>
        <span class="footer__coppy">©2026 all rights reserved by Mantas Studio</span>
    </footer>
</body>
</html>
